spring.application.name=SecondBrain

spring.datasource.url=jdbc:postgresql://localhost:5432/secondbrain
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Google Gemini via OpenAI-compatible API  set GEMINI_API_KEY
spring.ai.openai.api-key=${OPENROUTER_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.chat.options.model=meta-llama/llama-3-8b-instruct
spring.ai.openai.embedding.enabled=false

#Cloudinary
cloudinary.cloud_name=${CLOUDINARY_USER}
cloudinary.api_key=${CLOUDINARY_API}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
